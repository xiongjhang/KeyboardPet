name: Build (Tauri cross-platform)

# Builds the cross-platform Tauri app on macOS and Windows and uploads the
# installers as artifacts. The Windows installer is the easiest way to test the
# app on Windows without a local Rust/Tauri setup.
on:
  workflow_dispatch:
  push:
    branches: [feat/cross-platform-tauri]
    paths:
      - "tauri/**"
      - ".github/workflows/tauri-build.yml"
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: tauri
        run: npm install

      - name: Build the app (and bundle installers)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: keyboardpet-${{ matrix.platform }}
          path: |
            tauri/src-tauri/target/release/bundle/**/*
          if-no-files-found: warn
