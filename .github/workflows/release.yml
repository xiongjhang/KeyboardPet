name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build DMG & publish release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run tests
        run: swift test

      - name: Build & package DMG
        run: ./package_dmg.sh dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](https://github.com/xiongjhang/KeyboardPet/blob/main/CHANGELOG.md) for details.

            > The `.app` is ad-hoc signed (not notarized). On first launch macOS
            > may warn it's from an unidentified developer — right-click the app
            > and choose **Open**, or run
            > `xattr -dr com.apple.quarantine /Applications/KeyboardPet.app`.
