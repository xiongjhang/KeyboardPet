<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KeyboardPet</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <!-- The whole pet is a drag region so you can move it anywhere. -->
    <main id="pet" data-tauri-drag-region>
      <!-- Live WPM readout, shown above the crab while typing. -->
      <div id="wpm" class="hidden"><span id="wpm-value">0</span> WPM</div>
      <img id="sprite" alt="pet" draggable="false" />
    </main>
  </body>
</html>
